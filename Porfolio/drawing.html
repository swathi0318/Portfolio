<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^3/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px;
            background-color: #ffffff;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            transition: transform 0.3s ease;
            border-radius: 15px;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 15px;
            font-size: 1.5rem;
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .lightbox img {
            width: 80%;
            max-width: 1000px;
            border-radius: 15px;
        }
        .lightbox.active {
            visibility: visible;
            opacity: 1;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1000;
        }
        .gallery-itemspcl{
            width: 50px;
            height: 50px;;
        }
    </style>
</head>
<body>
    <h1 class="text-4xl text-center my-8 font-bold">Drawing Gallery</h1>
    <div class="gallery" id="gallery">
        <div class="gallery-item" onclick="openLightbox('img1.jpg')">
            <img src="drawing/image1 (2).jpeg" alt="Artwork 1">
            <div class="overlay">Artwork 1</div>
        </div>
        <div class="gallery-item" onclick="openLightbox('img2.jpg')">
            <img src="drawing/image3 (2).jpeg" alt="Artwork 2">
            <div class="overlay">Artwork 2</div>
        </div>
        <div class="gallery-itemspcl" onclick="openLightbox('img3.jpg')">
            <img src="drawing/image2 (2).jpeg" alt="Artwork 3">
            <div class="overlay">Artwork 3</div>
        </div>
       
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Artwork">
    </div>

    <script>
        function openLightbox(imgSrc) {
            document.getElementById('lightbox').classList.add('active');
            document.getElementById('lightbox-img').src = imgSrc;
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
